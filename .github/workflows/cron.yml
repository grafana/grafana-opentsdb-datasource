name: Scheduled Cloud end-to-end tests

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  playwright-cloud:
    uses: grafana/data-sources-ci-workflows/.github/workflows/playwright-cloud.yml@51ac69d43a199cee552c96fc184f15d64ea75892 # main
    secrets: inherit
    with:
      repo-secrets: |
        DS_INSTANCE_NAME=grafana-opentsdb-datasource/opentsdb:name
        DS_INSTANCE_URL=grafana-opentsdb-datasource/opentsdb:url
